<!DOCTYPE html>
<html>
<head>
  <title>Pre-Order Form</title>
  <style>
    body {
      font-family: Arial;
      background-color: #f4f4f4;
    }

    .container {
      width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 50px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 95%;
      padding: 8px;
      margin: 8px 0;
    }

    #terms {
      width: 10%;
    }

    button {
      padding: 10px;
      width: 100%;
      margin-top: 5px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    .error {
      color: red;
      margin-bottom: 10px;
      min-height: 18px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>CJ's bakery Pre-Order</h2>
  <p> We sell all sort of delicous snacks:D</p>

  <!-- Error Message Area -->
  <div id="errorMsg" class="error"></div>

  <form onsubmit="return handleOrder()">
    
    <label>Name:</label>
    <input type="text" id="name">

    <label>Product:</label>
    <select id="variant">
      <option value="">Select</option>
      <option value="Brownies">Brownies (50 PHP)</option>
      <option value="Cupcake">Cupcake (20PHP)</option>
    </select>

    <label>Quantity:</label>
    <input type="number" id="quantity">

    <label>Pickup Method:</label>
    <select id="pickup">
      <option value="">Select</option>
      <option value="Delivery">Delivery</option>
      <option value="Meetup">Meetup</option>
    </select>

    <label>Address (for delivery only):</label>
    <input type="text" id="address">

    <label>
      <input type="checkbox" id="terms"> I accept terms
    </label>
    <br><br>
    <button type="button" onclick="loadPreviousOrder()">Load Previous Order</button>
    <button type="submit">Submit</button>

  </form>
</div>

<script>

  // COOKIE FUNCTIONS 
  function setCookie(name, value, maxAge) {
    document.cookie = name + "=" + value + "; max-age=" + maxAge + "; path=/";
  }

  function getCookie(name) {
    let cookies = document.cookie.split(";");
    for (let i = 0; i < cookies.length; i++) {
      if (c.indexOf(name + "=") == 0) {
        return c.substring(name.length);
      }
    }
    return "";
  }

  function deleteCookie(name) {
    document.cookie = name + "=; max-age=0; path=/";
  }

  // MAIN SUBMIT HANDLER 
  function handleOrder() {
    document.getElementById("errorMsg").innerHTML = "";

    // Get values
    let name = document.getElementById("name").value;
    let product = document.getElementById("variant").value;
    let quantity = document.getElementById("quantity").value;
    let pickup = document.getElementById("pickup").value;
    let address = document.getElementById("address").value;
    let terms = document.getElementById("terms").checked;

    let errors = [];

    // Validation
    if (name == "" || product == "" || quantity == "" || pickup == "") {
      errors.push("All fields must not be empty");
    }

    if (quantity <= 0) {
      errors.push("Quantity must be greater than 0");
    }

    if (!terms) {
      errors.push("You must accept the terms");
    }

    if (pickup == "Delivery" && address == "") {
      errors.push("Address is required for delivery");
    }

    // If there are errors
    if (errors.length > 0) {
      document.getElementById("errorMsg").innerHTML = errors.join("<br>");
      return false;
    }

    // Store data
    setCookie("customerName", name, 300); // 5 mins

    localStorage.setItem("product", product);
    localStorage.setItem("quantity", quantity);
    localStorage.setItem("pickup", pickup);
    localStorage.setItem("address", address);

    // Redirect
    window.location.href = "summary.html";

    return false;
  }

  // LOAD PREVIOUS ORDER 
  function loadPreviousOrder() {

    let name = setCookie("customerName");
    let product = localStorage.setItem("product");
    let quantity = localStorage.setItem("quantity");
    let pickup = localStorage.setItem("pickup");
    let address = localStorage.setItem("address");

    if (!name || !product) {
      document.getElementById("errorMsg").innerHTML = "No previous order data";
      return;
    }

    document.getElementById("name").value = name;
    document.getElementById("variant").value = product;
    document.getElementById("quantity").value = quantity;
    document.getElementById("pickup").value = pickup;
    document.getElementById("address").value = address;
  }

</script>

</body>
</html>
